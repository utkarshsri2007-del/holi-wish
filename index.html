<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holi Surprise for Jhalak</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(to bottom,#fdf6ec,#f6efe5);
text-align:center;
color:#4a4a4a;
overflow-x:hidden;
}

.section{display:none;padding:60px 20px;animation:fade 0.8s ease-in;}
.active{display:block;}
h1,h2{color:#5a9c8b;}

button{
padding:12px 25px;
border-radius:30px;
border:none;
margin:15px;
cursor:pointer;
background:#7fc8b2;
color:white;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 10px 25px rgba(127,200,178,0.4);
}

.game-area{position:relative;height:300px;overflow:hidden;}

.balloon,.heart{
width:40px;height:40px;border-radius:50%;
position:absolute;cursor:pointer;
animation:floatUp 4s linear forwards;
}

@keyframes floatUp{
from{bottom:-60px;}
to{bottom:100%;}
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

/* Color circles */
.color-option{
width:70px;height:70px;border-radius:50%;
display:inline-block;margin:15px;cursor:pointer;
transition:0.3s;
}

.color-option:hover{transform:scale(1.15);}

/* Unlock buttons */
.unlock-btn{
display:block;
margin:15px auto;
width:200px;
}

/* 3D Water Drops */
.drop{
position:fixed;
top:-80px;
border-radius:50%;
pointer-events:none;
animation:dropFall linear forwards;
backdrop-filter:blur(2px);
box-shadow:
inset -4px -6px 10px rgba(255,255,255,0.4),
inset 4px 6px 10px rgba(0,0,0,0.15),
0 8px 15px rgba(0,0,0,0.1);
}

.drop::after{
content:'';
position:absolute;
top:15%;left:20%;
width:30%;height:30%;
background:rgba(255,255,255,0.7);
border-radius:50%;
filter:blur(2px);
}

@keyframes dropFall{
0%{transform:translateY(0) scale(1);}
85%{transform:translateY(90vh) scale(1);}
100%{transform:translateY(100vh) scale(1.4);opacity:0;}
}

.surprise-text{
max-width:650px;margin:auto;
line-height:1.9;font-size:16px;
min-height:220px;white-space:pre-line;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="section active" id="page1">
<h1>One Final Holi Wish for Jhalak 💛</h1>
<button onclick="nextPage(2)">Start</button>
</div>

<!-- PAGE 2 Balloon -->
<div class="section" id="page2">
<h1>🎈 Pop the Balloons</h1>
<button onclick="startBalloons()">Start</button>
<div class="game-area" id="game1"></div>
<button onclick="nextPage(3)">Next</button>
</div>

<!-- PAGE 3 Hearts -->
<div class="section" id="page3">
<h1>💗 Catch the Hearts</h1>
<button onclick="startHearts()">Start</button>
<div class="game-area" id="game2"></div>
<button onclick="nextPage(4)">Next</button>
</div>

<!-- PAGE 4 Find Color -->
<div class="section" id="page4">
<h1>🎨 Find Jhalak's Color</h1>
<p>Which color feels like her today?</p>

<div class="color-option" style="background:#f7b2d9" onclick="wrongColor()"></div>
<div class="color-option" style="background:#b5ead7" onclick="correctColor()"></div>
<div class="color-option" style="background:#ffdac1" onclick="wrongColor()"></div>
<div class="color-option" style="background:#c7ceea" onclick="wrongColor()"></div>

<p id="colorMsg"></p>
<button onclick="nextPage(5)">Next</button>
</div>

<!-- PAGE 5 Unlock -->
<div class="section" id="page5">
<h1>🔐 Unlock The Surprise</h1>
<p>Choose the correct order</p>

<button class="unlock-btn" onclick="checkOrder('Smile')">Smile</button>
<button class="unlock-btn" onclick="checkOrder('Color')">Color</button>
<button class="unlock-btn" onclick="checkOrder('Calm')">Calm</button>

<p id="unlockMsg"></p>
</div>

<!-- PAGE 6 Final -->
<div class="section" id="page6">
<h1>Happy Holi, Jhalak 💛</h1>
<div class="surprise-text" id="typedText"></div>
<button id="celebrateBtn" onclick="confettiRain()" style="display:none;">Celebrate 🎊</button>
</div>

<script>

function nextPage(num){
document.querySelectorAll('.section').forEach(sec=>sec.classList.remove('active'));
document.getElementById('page'+num).classList.add('active');
if(num===6){startTyping();}
}

/* Balloon */
function startBalloons(){
let area=document.getElementById("game1");
area.innerHTML="";
for(let i=0;i<12;i++){
let b=document.createElement("div");
b.className="balloon";
b.style.left=Math.random()*90+"%";
b.style.background=`hsl(${Math.random()*360},70%,70%)`;
b.onclick=function(){this.remove();}
area.appendChild(b);
}
}

/* Hearts */
function startHearts(){
let area=document.getElementById("game2");
area.innerHTML="";
for(let i=0;i<12;i++){
let h=document.createElement("div");
h.className="heart";
h.style.left=Math.random()*90+"%";
h.style.background=`hsl(${Math.random()*360},80%,75%)`;
h.onclick=function(){this.remove();}
area.appendChild(h);
}
}

/* Find Color */
function correctColor(){
document.getElementById("colorMsg").innerHTML="✨ Of course… she was always this shade of calm warmth.";
}

function wrongColor(){
document.getElementById("colorMsg").innerHTML="Hmm… close, but not quite her vibe 💛";
}

/* Unlock */
let correctSequence=["Smile","Color","Calm"];
let userSequence=[];

function checkOrder(value){
userSequence.push(value);

if(userSequence.length===3){
if(JSON.stringify(userSequence)===JSON.stringify(correctSequence)){
document.getElementById("unlockMsg").innerHTML="✨ You unlocked something special!";
setTimeout(()=>nextPage(6),1000);
}else{
document.getElementById("unlockMsg").innerHTML="Oops! Try again.";
userSequence=[];
}
}
}

/* Typing */
function startTyping(){
let text=`Holi always feels like a fresh start, and this year I wanted to share one with you.

Before words, there are colors. Before plans, there is laughter. And somehow every bright little moment reminds me of your energy.

You make ordinary days feel softer and happier. The way you smile, the way you listen, and the way you show up stays with me.

So this is my small Holi wish for you: more colors, more calm, and more honest moments like this.

Happy Holi.

With colors and warmth 💛`;

let i=0;
let target=document.getElementById("typedText");
target.innerHTML="";

function type(){
if(i<text.length){
target.innerHTML+=text.charAt(i);
i++;
setTimeout(type,30);
}else{
document.getElementById("celebrateBtn").style.display="inline-block";
}
}
type();
}

/* Continuous Rain */
let rainInterval;

function confettiRain(){
if(rainInterval) return;

rainInterval=setInterval(()=>{

let drop=document.createElement("div");
drop.className="drop";

let size=Math.random()*30+15;
drop.style.width=size+"px";
drop.style.height=size+"px";
drop.style.left=Math.random()*100+"%";

let hue=Math.random()*360;

drop.style.background=`radial-gradient(circle at 30% 30%,
hsla(${hue},100%,85%,0.95),
hsla(${hue},90%,60%,0.9) 60%,
hsla(${hue},80%,50%,0.85))`;

drop.style.animationDuration=(Math.random()*2+2)+"s";

document.body.appendChild(drop);
setTimeout(()=>{drop.remove();},4000);

},100);
}

</script>

</body>
</html>
